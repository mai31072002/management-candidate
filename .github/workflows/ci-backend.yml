name: Java CI with Gradle and Docker

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      working-directory: ./candidate-backend
      run: chmod +x gradlew
    
    - name: Build with Gradle
      working-directory: ./candidate-backend
      run: ./gradlew build -x test

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        # 1. Context: Folder chứa code để build (Backend)
        context: ./candidate-backend
        
        # 2. File: Đường dẫn chính xác tới file Dockerfile
        file: ./candidate-backend/Dockerfile
        
        # 3. Đẩy lên Docker Hub
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/employee-be:latest
# Production Configuration for Spring Boot

spring:
  profiles:
    active: prod
  
  # Database Configuration (PostgreSQL on Render)
  datasource:
    url: jdbc:postgresql://localhost:5434/employee_db
    username: employee_user
    password: employee_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true
        cache:
          use_second_level_cache: true
          use_query_cache: true
          region:
            factory_class: org.hibernate.cache.ehcache.EhCacheRegionFactory
  
  # Security Configuration
  security:
    jwt:
      secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnly123456789}
      expiration: 86400000 # 24 hours
      refresh-expiration: 604800000 # 7 days
  
  # CORS Configuration
  web:
    cors:
      allowed-origins: ${FRONTEND_URL:https://employee-management-frontend.onrender.com}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

# Server Configuration
server:
  port: ${PORT:8083}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
  http2:
    enabled: true

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
    info:
      enabled: true
    metrics:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99
      sla:
        http.server.requests: 10ms,50ms,100ms,200ms,500ms,1s,2s,5s

# Logging Configuration
logging:
  level:
    root: INFO
    com.employees: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /tmp/application.log
    max-size: 10MB
    max-history: 30

# Application Specific Configuration
app:
  security:
    allowed-origins: ${FRONTEND_URL:http://localhost:3000,https://employee-management-frontend.onrender.com}
    cors:
      enabled: true
  
  file:
    upload:
      max-size: 10MB
      allowed-types: jpg,jpeg,png,pdf,doc,docx,xls,xlsx
      location: /tmp/uploads
  
  cache:
    redis:
      enabled: false # Disable Redis if not available
      ttl: 3600 # 1 hour
  
  email:
    enabled: false # Disable email in production unless configured
  
  notification:
    enabled: true
    channels: in-app

# Performance Tuning
  task:
    execution:
      pool:
        core-size: 8
        max-size: 32
        queue-capacity: 100
        keep-alive: 60s
      scheduling:
        pool:
          size: 4

# Flyway Database Migration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

# Cache Configuration
  cache-type: simple # Use simple cache if Redis not available
  cache-names:
    - employees
    - departments
    - positions
    - user-permissions

# Health Check Configuration
health:
  checks:
    database:
      enabled: true
      timeout: 5s
    disk-space:
      enabled: true
      threshold: 100MB
    memory:
      enabled: true
      threshold: 100MB

# Error Handling
error:
  include-message: always
  include-binding-errors: always
  include-stacktrace: on-param

# Validation
validation:
  enabled: true
  fail-fast: true

# API Documentation
springdoc:
  api-docs:
    enabled: false # Disable in production
  swagger-ui:
    enabled: false # Disable in production

---
# Development Profile Override
spring:
  config:
    activate:
      on-profile: dev
  
  datasource:
    url: jdbc:mysql://localhost:3306/employee_db
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  
  security:
    jwt:
      secret: dev-secret-key-for-development-only-123456789

logging:
  level:
    root: DEBUG
    com.employees: DEBUG
    org.springframework.security: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
